name: CI

# Fast, deterministic PR gate for both stacks in this repo:
#   - web:    the vrai-faces TS workspace (typecheck / no-any / unit tests / build)
#   - portal: the MedSim FastAPI portal (pytest)
# The heavy browser e2e + soak lane lives in e2e.yml (nightly / manual).

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (vrai-faces)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vrai-faces
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: vrai-faces/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Same chain run locally before every commit (BUILD_STATE convention).
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Forbidden-token scan (no `any`)
        run: pnpm -F @vrai/core run check:no-any
      - name: Unit tests
        run: pnpm -r test
      - name: Build
        run: pnpm -F @vrai/core build

  portal:
    name: portal (medsim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install (dev + serve extras)
        run: pip install -e ".[dev,serve]"

      # Gating: the FULL portal suite (v7 + v8 + top-level). It silently rotted
      # for a long time because only tests/v8 gated and the rest ran with
      # continue-on-error. Now everything gates after the v7 cleanup (#85/#86)
      # and the #87 test-isolation fixes — test_device_debrief gets a per-test DB
      # (events were accumulating in the shared ~/.medsim DB) and test_voices
      # isolates the vault (a leaked ELEVENLABS key broke the offline tests under
      # full-suite ordering); pytest-asyncio is in the dev extra. Nothing rots now.
      - name: Portal tests (full suite)
        run: pytest tests -q
