<?xml version="1.0" encoding="UTF-8"?>
<!-- M51 — Patient Integrated Alarm stub skin. The PIA renders a
     dedicated pia_app.html template instead of overlaying this skin
     onto the device chrome (the PIA is a control surface, not a
     vendor-skinned hardware mock). This file exists only so the
     registry's load_skin doesn't fail for legacy callers. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#1a2540"/>
  <text x="50" y="55" text-anchor="middle" fill="#d4dcf2"
        font-family="sans-serif" font-size="10" font-weight="700">PIA</text>
</svg>
