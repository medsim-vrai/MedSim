<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 990" width="820" height="990">
<!-- TRAINING SIMULATION overlay - Amsino Sentinel stationary pole-mount enteral feeding pump. Dual 7-segment windows + hard buttons. -->
<style>
 text{font-family:Helvetica,Arial,sans-serif}
 .kcap{font-size:11px;font-weight:bold;fill:#28303a}
 .kcap2{font-size:9px;font-weight:bold;fill:#28303a}
 .mono{font-family:'DejaVu Sans Mono',monospace}
 .devname{font-size:20px;font-weight:bold;fill:#1b2733}
 .sub{font-size:11px;fill:#5b6470}
 .winlbl{font-size:11px;font-weight:bold;fill:#2a3138;letter-spacing:1px}
 .badge{font-size:11px;fill:#7c8893}
</style>
<defs>
 <linearGradient id="caseGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#f1ede2"/><stop offset="1" stop-color="#d8d2c2"/>
 </linearGradient>
 <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#3a0c08"/><stop offset="1" stop-color="#1c0604"/>
 </linearGradient>
 <radialGradient id="wheelGrad" cx="0.4" cy="0.35" r="0.8">
  <stop offset="0" stop-color="#46505a"/><stop offset="1" stop-color="#171c22"/>
 </radialGradient>
</defs>

<g id="backdrop"><rect x="0" y="0" width="820" height="990" fill="#e7ecf0"/></g>

<g id="chassis">
 <!-- boxy stationary chassis -->
 <rect x="150" y="58" width="520" height="720" rx="20" fill="url(#caseGrad)" stroke="#b3ac98" stroke-width="3"/>
 <rect x="164" y="72" width="492" height="692" rx="14" fill="none" stroke="#fbf8ee" stroke-width="1.4" opacity="0.8"/>
 <!-- built-in pole clamp at right edge -->
 <rect x="664" y="320" width="56" height="180" rx="10" fill="#cfc8b6" stroke="#b3ac98" stroke-width="2.5"/>
 <circle cx="692" cy="410" r="34" fill="none" stroke="#9a937f" stroke-width="14"/>
 <rect x="700" y="368" width="44" height="20" rx="10" fill="#8f8874" stroke="#73705f" stroke-width="2"/>
 <rect x="700" y="432" width="44" height="20" rx="10" fill="#8f8874" stroke="#73705f" stroke-width="2"/>
 <text class="sub" x="692" y="525" font-size="9" text-anchor="middle">POLE CLAMP</text>
 <!-- carry handle -->
 <rect x="350" y="42" width="120" height="20" rx="10" fill="#d8d2c2" stroke="#b3ac98" stroke-width="2"/>
 <!-- name plate -->
 <text class="devname" x="184" y="106">Sentinel</text>
 <text class="sub" x="185" y="124">Amsino - Enteral Feeding Pump  (model S-1000-SI)</text>
</g>

<g id="screen">
 <!-- LEFT seven-segment window: INFUSION RATE -->
 <rect x="184" y="146" width="222" height="118" rx="10" fill="url(#winGrad)" stroke="#160503" stroke-width="2"/>
 <rect x="196" y="158" width="198" height="94" rx="5" fill="#260706"/>
 <text id="scr-rate" class="mono" x="295" y="232" font-size="66" font-weight="bold" fill="#ff5a3c" text-anchor="middle">125</text>
 <text class="winlbl" x="295" y="284" text-anchor="middle">INFUSION RATE  mL/hr</text>

 <!-- RIGHT seven-segment window: VOLUME DELIVERED -->
 <rect x="424" y="146" width="222" height="118" rx="10" fill="url(#winGrad)" stroke="#160503" stroke-width="2"/>
 <rect x="436" y="158" width="198" height="94" rx="5" fill="#260706"/>
 <text id="scr-volume" class="mono" x="535" y="232" font-size="66" font-weight="bold" fill="#ff5a3c" text-anchor="middle">540</text>
 <text class="winlbl" x="535" y="284" text-anchor="middle">VOLUME DELIVERED  mL</text>

 <!-- dim ghost segments for the calculator look -->
 <text class="mono" x="295" y="232" font-size="66" font-weight="bold" fill="#5a1410" text-anchor="middle" opacity="0.35">888</text>
 <text class="mono" x="535" y="232" font-size="66" font-weight="bold" fill="#5a1410" text-anchor="middle" opacity="0.35">888</text>
 <!-- redraw live values over the ghosts -->
 <text class="mono" x="295" y="232" font-size="66" font-weight="bold" fill="#ff5a3c" text-anchor="middle">125</text>
 <text class="mono" x="535" y="232" font-size="66" font-weight="bold" fill="#ff5a3c" text-anchor="middle">540</text>
</g>

<g id="controls">
 <!-- printed programming directions strip -->
 <rect x="184" y="300" width="462" height="22" rx="5" fill="#e6e0d0" stroke="#c8c1ac" stroke-width="1"/>
 <text class="sub" x="195" y="315" font-size="9">ON / OFF power - UP/DOWN set rate - SET dose limit - RUN/STOP feed - CLEAR memory</text>

 <!-- hard-button control panel: 8 dedicated keys, 2 rows of 4 -->
 <g class="key"><rect id="key-onoff" data-control="hardkey" data-action="ON" x="184" y="334" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="238" y="364" text-anchor="middle">ON</text></g>
 <g class="key"><rect id="key-off" data-control="hardkey" data-action="OFF" x="300" y="334" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="354" y="364" text-anchor="middle">OFF</text></g>
 <g class="key"><rect id="key-up" data-control="hardkey" data-action="UP" x="416" y="334" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="470" y="358" text-anchor="middle">UP</text><path d="M462 366 h16 l-8 -8 Z" fill="#28303a"/></g>
 <g class="key"><rect id="key-down" data-control="hardkey" data-action="DOWN" x="532" y="334" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="586" y="358" text-anchor="middle">DOWN</text><path d="M578 360 h16 l-8 8 Z" fill="#28303a"/></g>

 <g class="key"><rect id="key-set" data-control="hardkey" data-action="SET" x="184" y="392" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="238" y="422" text-anchor="middle">SET</text></g>
 <g class="key"><rect id="key-options" data-control="hardkey" data-action="DOSE_CHECK" x="300" y="392" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap2" x="354" y="416" text-anchor="middle">DOSE</text><text class="kcap2" x="354" y="429" text-anchor="middle">CHECK</text></g>
 <g class="key"><rect id="key-run" data-control="hardkey" data-action="RUN_STOP" x="416" y="392" width="108" height="50" rx="7" fill="#e7f4ec" stroke="#a9d4ba" stroke-width="1.8"/><text class="kcap2" x="470" y="416" text-anchor="middle" fill="#207a43">RUN /</text><text class="kcap2" x="470" y="429" text-anchor="middle" fill="#207a43">STOP</text></g>
 <g class="key"><rect id="key-clear" data-control="hardkey" data-action="CLEAR" x="532" y="392" width="108" height="50" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="586" y="422" text-anchor="middle">CLEAR</text></g>

 <!-- drip chamber + sensor opening -->
 <rect x="184" y="470" width="220" height="270" rx="14" fill="#e6e0d0" stroke="#c8c1ac" stroke-width="2"/>
 <text class="sub" x="200" y="492" font-size="9">DRIP CHAMBER + SENSOR</text>
 <!-- sensor opening recess -->
 <rect x="222" y="500" width="78" height="190" rx="10" fill="#cfc8b6" stroke="#9a937f" stroke-width="2"/>
 <!-- drip chamber seated in opening -->
 <rect x="244" y="510" width="34" height="160" rx="16" fill="#ffffff" stroke="#aab3bb" stroke-width="1.6" opacity="0.92"/>
 <ellipse cx="261" cy="528" rx="11" ry="6" fill="#bcd6ea"/>
 <rect x="252" y="540" width="18" height="118" rx="8" fill="#dbeaf5"/>
 <!-- a falling drop -->
 <path d="M261 552 q5 8 0 15 q-5 -7 0 -15 Z" fill="#3E7CB1"/>
 <text class="sub" x="200" y="710" font-size="9">locator shelf - seat chamber left</text>
 <!-- AC + battery indicator lights -->
 <circle id="led-ac" data-control="led" cx="330" cy="520" r="9" fill="#3DA35D" stroke="#2c7d46" stroke-width="1"/>
 <circle cx="327" cy="517" r="3" fill="#bfe8cc"/>
 <text class="sub" x="346" y="524" font-size="9">AC</text>
 <circle id="led-battery" data-control="led" cx="330" cy="556" r="9" fill="#5b6470" stroke="#3a4046" stroke-width="1"/>
 <circle cx="327" cy="553" r="3" fill="#9aa3ad"/>
 <text class="sub" x="346" y="560" font-size="9">BATTERY</text>

 <!-- rotor + tube retainer -->
 <circle cx="510" cy="586" r="62" fill="url(#wheelGrad)" stroke="#0c0f12" stroke-width="2"/>
 <circle cx="510" cy="586" r="40" fill="#20262d" stroke="#0c0f12" stroke-width="1.4"/>
 <circle cx="510" cy="586" r="10" fill="#3a444e"/>
 <circle cx="510" cy="530" r="7" fill="#586470"/>
 <circle cx="554" cy="558" r="7" fill="#586470"/>
 <circle cx="554" cy="614" r="7" fill="#586470"/>
 <circle cx="510" cy="642" r="7" fill="#586470"/>
 <circle cx="466" cy="614" r="7" fill="#586470"/>
 <circle cx="466" cy="558" r="7" fill="#586470"/>
 <!-- tube path around rotor -->
 <path d="M510 510 a76 76 0 0 1 0 152" fill="none" stroke="#2f8f9c" stroke-width="6" stroke-linecap="round"/>
 <text class="sub" x="510" y="676" font-size="9" text-anchor="middle">ROTOR + TUBE RETAINER</text>
</g>

<g id="indicators">
 <!-- status pill -->
 <rect id="scr-status" data-control="display-field" x="424" y="700" width="222" height="34" rx="17" fill="#3DA35D"/>
 <text x="535" y="722" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">RUNNING</text>
</g>

<g id="labels">
 <text class="badge" x="410" y="850" text-anchor="middle" font-weight="bold">TRAINING SIMULATION - NOT A MEDICAL DEVICE</text>
 <text class="badge" x="410" y="870" text-anchor="middle">Simulated interface - Amsino Sentinel stationary enteral feeding pump</text>
</g>
</svg>
