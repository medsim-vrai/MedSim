<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1010" width="780" height="1010">
<!-- TRAINING SIMULATION overlay - Cardinal Health Kangaroo OMNI Enteral Feeding Pump. Phase 2. -->
<style>
 text{font-family:Helvetica,Arial,sans-serif}
 .kcap{font-size:11px;font-weight:bold;fill:#28303a}
 .kcap2{font-size:9px;font-weight:bold;fill:#28303a}
 .mono{font-family:'DejaVu Sans Mono',monospace}
 .devname{font-size:20px;font-weight:bold;fill:#28303a}
 .sub{font-size:11px;fill:#5b6470}
 .scrlbl{font-size:10px;fill:#1f6b35}
 .scrwht{font-size:10px;font-weight:bold;fill:#ffffff}
 .badge{font-size:11px;fill:#7c8893}
</style>
<defs>
 <linearGradient id="chassisGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#f4f5f6"/><stop offset="1" stop-color="#d9dde0"/>
 </linearGradient>
 <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#46b86a"/><stop offset="1" stop-color="#2f9651"/>
 </linearGradient>
 <radialGradient id="rotorGrad" cx="0.4" cy="0.35" r="0.8">
  <stop offset="0" stop-color="#42484e"/><stop offset="1" stop-color="#15191d"/>
 </radialGradient>
</defs>

<g id="backdrop"><rect x="0" y="0" width="780" height="1010" fill="#e7ecf0"/></g>

<g id="chassis">
 <!-- handle -->
 <rect x="300" y="34" width="180" height="40" rx="20" fill="none" stroke="#b9bfc5" stroke-width="14"/>
 <!-- main body -->
 <rect x="120" y="70" width="540" height="790" rx="34" fill="url(#chassisGrad)" stroke="#aeb6bd" stroke-width="2.5"/>
 <text class="devname" x="150" y="118">Kangaroo OMNI</text>
 <text class="sub" x="151" y="135">Enteral Feeding Pump - Cardinal Health</text>
 <!-- selection soft-key panel ledge -->
 <rect x="500" y="170" width="132" height="312" rx="12" fill="#eceef0" stroke="#c2c8ce" stroke-width="1.5"/>
 <!-- rotor recess panel -->
 <rect x="150" y="560" width="480" height="262" rx="16" fill="#dfe3e6" stroke="#c2c8ce" stroke-width="2"/>
</g>

<g id="screen">
 <!-- bezel -->
 <rect x="150" y="160" width="334" height="330" rx="12" fill="#1c2024"/>
 <!-- full-colour screen, GREEN running-state background -->
 <rect id="screen-bg" x="160" y="170" width="314" height="310" rx="6" fill="url(#screenGrad)"/>

 <!-- title / status bar -->
 <rect x="160" y="170" width="314" height="34" rx="6" fill="#1f7a3f"/>
 <rect x="160" y="190" width="314" height="14" fill="#1f7a3f"/>
 <text id="scr-status" x="176" y="192" font-size="14" font-weight="bold" fill="#ffffff">Feeding</text>
 <text id="scr-mode" x="372" y="192" font-size="11" fill="#cdeed8">Continuous</text>

 <!-- icon tray -->
 <rect x="160" y="204" width="314" height="30" fill="#258a48"/>
 <!-- >24H icon -->
 <rect x="170" y="210" width="40" height="18" rx="4" fill="#1f7a3f"/>
 <text x="190" y="223" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">&gt;24H</text>
 <!-- audio-paused icon (bell with slash) -->
 <path d="M236 213 q0 -7 7 -7 q7 0 7 7 l0 7 l3 4 l-20 0 l3 -4 Z" fill="none" stroke="#ffffff" stroke-width="1.6"/>
 <circle cx="243" cy="227" r="2.4" fill="#ffffff"/>
 <line id="icon-audio-paused" x1="230" y1="208" x2="256" y2="230" stroke="#ffffff" stroke-width="2"/>
 <!-- lock-settings icon -->
 <rect id="icon-lock" x="278" y="216" width="14" height="11" rx="2" fill="#ffffff"/>
 <path d="M281 216 l0 -4 q0 -4 4 -4 q4 0 4 4 l0 4" fill="none" stroke="#ffffff" stroke-width="1.8"/>
 <!-- battery % -->
 <rect x="412" y="212" width="26" height="13" rx="2" fill="none" stroke="#ffffff" stroke-width="1.4"/>
 <rect x="438" y="215" width="3" height="7" fill="#ffffff"/>
 <rect x="414" y="214" width="18" height="9" fill="#ffffff"/>
 <text id="scr-battery" x="452" y="222" font-size="10" fill="#ffffff">82%</text>

 <!-- moving blue droplet flow indicator -->
 <g id="scr-flow-indicator" data-control="display-field">
  <line x1="232" y1="252" x2="232" y2="330" stroke="#bfe6cb" stroke-width="2" stroke-dasharray="3 5"/>
  <path d="M232 270 q11 16 0 28 q-11 -12 0 -28 Z" fill="#3E7CB1" stroke="#bcd6e8" stroke-width="1.2"/>
  <circle cx="228" cy="290" r="2.2" fill="#d6e7f2"/>
 </g>

 <!-- feed rate primary readout -->
 <text class="scrlbl" x="258" y="270" fill="#d8f0df">FEED RATE</text>
 <text id="scr-rate" class="mono" x="256" y="314" font-size="44" font-weight="bold" fill="#ffffff">85</text>
 <text x="352" y="314" font-size="15" fill="#dff3e6">mL/hr</text>

 <!-- secondary running values -->
 <rect x="256" y="328" width="206" height="52" rx="6" fill="#258a48"/>
 <text class="scrwht" x="268" y="346">VOLUME FED</text>
 <text id="scr-vi" class="mono" x="268" y="370" font-size="18" fill="#ffffff">340 mL</text>
 <text class="scrwht" x="372" y="346">FLUSH</text>
 <text id="scr-flush" class="mono" x="372" y="370" font-size="18" fill="#ffffff">25 mL</text>

 <!-- on-screen soft-key option labels (printed at screen right edge, beside each key) -->
 <text id="scr-opt-1" x="468" y="250" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="end">Stop</text>
 <text id="scr-opt-2" x="468" y="402" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="end">Pause</text>
 <text id="scr-opt-3" x="468" y="430" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="end">Flush Now</text>
 <text id="scr-opt-4" x="468" y="458" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="end">More Options</text>
</g>

<g id="controls">
 <!-- column of selection soft keys beside the screen -->
 <g class="key"><rect id="softkey-1" data-control="softkey" data-action="STOP" x="514" y="186" width="104" height="58" rx="8" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <circle cx="528" cy="215" r="4" fill="#5b6470"/><text class="kcap2" x="566" y="219" text-anchor="middle">SELECT</text></g>
 <g class="key"><rect id="softkey-2" data-control="softkey" data-action="PAUSE" x="514" y="256" width="104" height="58" rx="8" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <circle cx="528" cy="285" r="4" fill="#5b6470"/><text class="kcap2" x="566" y="289" text-anchor="middle">SELECT</text></g>
 <g class="key"><rect id="softkey-3" data-control="softkey" data-action="FLUSH_NOW" x="514" y="326" width="104" height="58" rx="8" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <circle cx="528" cy="355" r="4" fill="#5b6470"/><text class="kcap2" x="566" y="359" text-anchor="middle">SELECT</text></g>
 <g class="key"><rect id="softkey-4" data-control="softkey" data-action="MORE_OPTIONS" x="514" y="396" width="104" height="58" rx="8" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <circle cx="528" cy="425" r="4" fill="#5b6470"/><text class="kcap2" x="566" y="429" text-anchor="middle">SELECT</text></g>

 <!-- + / - rate adjust keys -->
 <g class="key"><rect id="key-down" data-control="hardkey" data-action="DECREMENT" x="158" y="510" width="92" height="36" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap" x="204" y="534" text-anchor="middle">&#8211;</text></g>
 <g class="key"><rect id="key-up" data-control="hardkey" data-action="INCREMENT" x="262" y="510" width="92" height="36" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap" x="308" y="534" text-anchor="middle">+</text></g>
 <text class="sub" x="256" y="503" text-anchor="middle">ADJUST RATE</text>

 <!-- mute alarm (bell) key -->
 <g class="key"><rect id="key-silence" data-control="hardkey" data-action="MUTE_ALARM" x="370" y="510" width="100" height="36" rx="7" fill="#fdeceb" stroke="#e0a9a4" stroke-width="1.5"/>
  <text class="kcap2" x="420" y="532" text-anchor="middle" fill="#a8322a">MUTE ALARM</text></g>

 <!-- Power button -->
 <g class="key"><rect id="key-power" data-control="hardkey" data-action="POWER" x="500" y="498" width="60" height="60" rx="12" fill="#eef1f3" stroke="#c2c8ce" stroke-width="1.5"/>
  <circle cx="530" cy="524" r="11" fill="none" stroke="#28303a" stroke-width="2.4"/>
  <line x1="530" y1="510" x2="530" y2="524" stroke="#28303a" stroke-width="2.4"/>
  <text class="kcap2" x="530" y="552" text-anchor="middle">POWER</text></g>

 <!-- Night Mode button -->
 <g class="key"><rect id="key-night-mode" data-control="hardkey" data-action="NIGHT_MODE" x="572" y="498" width="60" height="60" rx="12" fill="#eef1f3" stroke="#c2c8ce" stroke-width="1.5"/>
  <path d="M608 510 a13 13 0 1 0 11 21 a10 10 0 0 1 -11 -21 Z" fill="#3a4250"/>
  <text class="kcap2" x="602" y="552" text-anchor="middle">NIGHT</text></g>

 <!-- pump rotor wheel (visible black circular rotor on lower face) -->
 <circle id="pump-rotor" data-control="display-field" cx="318" cy="690" r="86" fill="url(#rotorGrad)" stroke="#0c0f12" stroke-width="3"/>
 <circle cx="318" cy="690" r="58" fill="none" stroke="#3a4148" stroke-width="2"/>
 <circle cx="318" cy="690" r="22" fill="#2a2f34" stroke="#0c0f12" stroke-width="2"/>
 <!-- rotor lobes -->
 <circle cx="318" cy="626" r="12" fill="#52595f"/>
 <circle cx="374" cy="658" r="12" fill="#52595f"/>
 <circle cx="374" cy="722" r="12" fill="#52595f"/>
 <circle cx="318" cy="754" r="12" fill="#52595f"/>
 <circle cx="262" cy="722" r="12" fill="#52595f"/>
 <circle cx="262" cy="658" r="12" fill="#52595f"/>
 <text class="sub" x="318" y="800" text-anchor="middle">Rotor / cassette loading area</text>

 <!-- valve actuator + occlusion sensors stub -->
 <rect x="430" y="612" width="66" height="46" rx="6" fill="#cfd4d8" stroke="#b3b9bf" stroke-width="1.5"/>
 <text class="kcap2" x="463" y="632" text-anchor="middle">VALVE</text>
 <text class="kcap2" x="463" y="645" text-anchor="middle">ACTUATOR</text>
 <rect x="430" y="668" width="66" height="40" rx="6" fill="#cfd4d8" stroke="#b3b9bf" stroke-width="1.5"/>
 <text class="kcap2" x="463" y="685" text-anchor="middle">FORCE</text>
 <text class="kcap2" x="463" y="698" text-anchor="middle">SENSOR</text>
 <rect x="430" y="718" width="66" height="40" rx="6" fill="#cfd4d8" stroke="#b3b9bf" stroke-width="1.5"/>
 <text class="kcap2" x="463" y="735" text-anchor="middle">OCCL.</text>
 <text class="kcap2" x="463" y="748" text-anchor="middle">SENSORS</text>
</g>

<g id="indicators">
 <!-- LED status cluster at upper right -->
 <rect x="556" y="92" width="86" height="60" rx="9" fill="#2b3138"/>
 <circle id="led-run" data-control="led" cx="577" cy="122" r="9" fill="#3DA35D" stroke="#2c7d46" stroke-width="1"/>
 <circle cx="574" cy="119" r="3" fill="#bfe8cc"/>
 <circle id="led-alarm" data-control="led" cx="606" cy="122" r="9" fill="#5b6470" stroke="#3a4148" stroke-width="1"/>
 <circle id="led-info" data-control="led" cx="635" cy="122" r="9" fill="#5b6470" stroke="#3a4148" stroke-width="1"/>
 <text x="599" y="146" font-size="8" fill="#9fb0bd" text-anchor="middle">STATUS</text>

 <!-- green AC power indicator light -->
 <circle id="led-ac" data-control="led" cx="158" cy="836" r="8" fill="#3DA35D" stroke="#2c7d46" stroke-width="1"/>
 <circle cx="155" cy="833" r="2.6" fill="#bfe8cc"/>
 <text class="sub" x="174" y="840">AC Power</text>
</g>

<g id="labels">
 <text class="badge" x="390" y="958" text-anchor="middle" font-weight="bold">TRAINING SIMULATION - NOT A MEDICAL DEVICE</text>
 <text class="badge" x="390" y="976" text-anchor="middle">Simulated interface - Cardinal Health Kangaroo OMNI Enteral Feeding Pump</text>
</g>
</svg>
