<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1010" width="780" height="1010">
<!-- TRAINING SIMULATION overlay - Baxter Spectrum IQ Infusion System. Phase 2. Single-channel LVP, colour display, barcode scanner. -->
<style>
 text{font-family:Helvetica,Arial,sans-serif}
 .kcap{font-size:11px;font-weight:bold;fill:#28303a}
 .kcap2{font-size:9px;font-weight:bold;fill:#28303a}
 .mono{font-family:'DejaVu Sans Mono',monospace}
 .devname{font-size:20px;font-weight:bold;fill:#28303a}
 .sub{font-size:11px;fill:#5b6470}
 .fld{font-size:11px;fill:#9fb0bd}
 .badge{font-size:11px;fill:#7c8893}
</style>
<defs>
 <linearGradient id="chassisGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#eef0f2"/><stop offset="1" stop-color="#d0d4d8"/>
 </linearGradient>
 <linearGradient id="scrGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#13324f"/><stop offset="1" stop-color="#0c2238"/>
 </linearGradient>
 <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#3a4047"/><stop offset="1" stop-color="#22272c"/>
 </linearGradient>
</defs>

<g id="backdrop"><rect x="0" y="0" width="780" height="1010" fill="#e7ecf0"/></g>

<g id="chassis">
 <rect x="120" y="44" width="540" height="830" rx="20" fill="url(#chassisGrad)" stroke="#aeb4ba" stroke-width="2.5"/>
 <text class="devname" x="146" y="84">Baxter Spectrum IQ</text>
 <text class="sub" x="147" y="100">Single-channel large-volume infusion pump</text>
</g>

<g id="screen">
 <!-- bright colour display -->
 <rect x="146" y="118" width="388" height="262" rx="10" fill="#11151a"/>
 <rect id="screen-bg" x="156" y="128" width="368" height="242" rx="5" fill="url(#scrGrad)"/>
 <!-- top status bar -->
 <rect x="156" y="128" width="368" height="28" rx="5" fill="#0c4a8a"/>
 <rect x="156" y="142" width="368" height="14" fill="#0c4a8a"/>
 <text id="scr-mode" x="166" y="147" font-size="11" font-weight="bold" fill="#ffffff">Dose IQ - Adult General</text>
 <!-- battery -->
 <rect x="476" y="135" width="26" height="13" rx="2" fill="none" stroke="#ffffff" stroke-width="1.4"/>
 <rect x="502" y="138" width="3" height="7" fill="#ffffff"/>
 <rect x="478" y="137" width="17" height="9" fill="#ffffff"/>
 <text id="scr-battery" x="468" y="146" font-size="10" fill="#ffffff" text-anchor="end">AC</text>

 <!-- drug name row -->
 <text id="scr-drug" x="166" y="186" font-size="17" font-weight="bold" fill="#ffffff">HEPARIN 25,000 units/250 mL</text>
 <!-- status pill -->
 <rect id="scr-status" x="166" y="198" width="92" height="24" rx="12" fill="#3DA35D"/>
 <text x="212" y="214" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">INFUSING</text>
 <!-- DERS / connected badge -->
 <text x="514" y="214" font-size="10" fill="#7fb6e6" text-anchor="end">DERS</text>

 <!-- primary rate readout -->
 <text class="fld" x="166" y="244">Rate</text>
 <text id="scr-rate" class="mono" x="166" y="284" font-size="44" font-weight="bold" fill="#ffffff">14</text>
 <text x="232" y="284" font-size="14" fill="#9fb0bd">mL/h</text>
 <text id="scr-dose" x="166" y="308" font-size="13" fill="#cfe0a8">Dose  18 units/kg/hr</text>

 <!-- secondary fields, right column -->
 <text class="fld" x="320" y="248">VTBI</text>
 <text id="scr-vtbi" class="mono" x="320" y="267" font-size="17" fill="#ffffff">211 mL</text>
 <text class="fld" x="320" y="288">Volume infused</text>
 <text id="scr-vi" class="mono" x="320" y="307" font-size="17" fill="#ffffff">39 mL</text>
 <text class="fld" x="320" y="328">Time remaining</text>
 <text id="scr-time" class="mono" x="412" y="328" font-size="13" fill="#ffffff">15 hr 04 min</text>

 <!-- contextual soft-key label strip across bottom of screen -->
 <rect id="scr-next" x="156" y="344" width="368" height="26" rx="3" fill="#0b1c2e"/>
 <text x="200" y="361" font-size="9" font-weight="bold" fill="#9fb0bd" text-anchor="middle">TITRATE</text>
 <text x="292" y="361" font-size="9" font-weight="bold" fill="#9fb0bd" text-anchor="middle">SECONDARY</text>
 <text x="384" y="361" font-size="9" font-weight="bold" fill="#9fb0bd" text-anchor="middle">HELP</text>
 <text x="476" y="361" font-size="9" font-weight="bold" fill="#9fb0bd" text-anchor="middle">OPTIONS</text>
</g>

<g id="controls">
 <!-- context soft keys, directly below the on-screen labels -->
 <g class="key"><rect id="softkey-1" data-control="softkey" x="160" y="392" width="84" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="202" y="416" text-anchor="middle">TITRATE</text></g>
 <g class="key"><rect id="softkey-2" data-control="softkey" x="252" y="392" width="84" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="294" y="412" text-anchor="middle">SECOND-</text>
  <text class="kcap2" x="294" y="423" text-anchor="middle">ARY</text></g>
 <g class="key"><rect id="softkey-3" data-control="softkey" x="344" y="392" width="84" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="386" y="416" text-anchor="middle">HELP</text></g>
 <g class="key"><rect id="softkey-4" data-control="softkey" x="436" y="392" width="84" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="478" y="416" text-anchor="middle">OPTIONS</text></g>

 <!-- numeric keypad -->
 <g class="key"><rect id="key-1" data-control="hardkey" data-action="1" x="160" y="450" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="191" y="475" text-anchor="middle">1</text></g>
 <g class="key"><rect id="key-2" data-control="hardkey" data-action="2" x="230" y="450" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="261" y="475" text-anchor="middle">2</text></g>
 <g class="key"><rect id="key-3" data-control="hardkey" data-action="3" x="300" y="450" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="331" y="475" text-anchor="middle">3</text></g>
 <g class="key"><rect id="key-4" data-control="hardkey" data-action="4" x="160" y="496" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="191" y="521" text-anchor="middle">4</text></g>
 <g class="key"><rect id="key-5" data-control="hardkey" data-action="5" x="230" y="496" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="261" y="521" text-anchor="middle">5</text></g>
 <g class="key"><rect id="key-6" data-control="hardkey" data-action="6" x="300" y="496" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="331" y="521" text-anchor="middle">6</text></g>
 <g class="key"><rect id="key-7" data-control="hardkey" data-action="7" x="160" y="542" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="191" y="567" text-anchor="middle">7</text></g>
 <g class="key"><rect id="key-8" data-control="hardkey" data-action="8" x="230" y="542" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="261" y="567" text-anchor="middle">8</text></g>
 <g class="key"><rect id="key-9" data-control="hardkey" data-action="9" x="300" y="542" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="331" y="567" text-anchor="middle">9</text></g>
 <g class="key"><rect id="key-decimal" data-control="hardkey" data-action="." x="160" y="588" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="191" y="613" text-anchor="middle">.</text></g>
 <g class="key"><rect id="key-0" data-control="hardkey" data-action="0" x="230" y="588" width="62" height="40" rx="6" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap" x="261" y="613" text-anchor="middle">0</text></g>
 <g class="key"><rect id="key-clear" data-control="hardkey" data-action="CLEAR" x="300" y="588" width="62" height="40" rx="6" fill="#eef1f3" stroke="#c2c8ce" stroke-width="1.5"/><text class="kcap2" x="331" y="612" text-anchor="middle">CLEAR</text></g>

 <!-- control / safety hard keys, right block -->
 <g class="key"><rect id="key-select" data-control="hardkey" data-action="SELECT" x="382" y="450" width="138" height="40" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="451" y="474" text-anchor="middle">SELECT / ENTER</text></g>
 <g class="key"><rect id="key-back" data-control="hardkey" data-action="BACK" x="382" y="496" width="138" height="40" rx="7" fill="#f3f4f6" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="451" y="520" text-anchor="middle">BACK</text></g>
 <g class="key"><rect id="key-pause" data-control="hardkey" data-action="SILENCE" x="382" y="542" width="138" height="40" rx="7" fill="#fdf4e3" stroke="#e6cf9c" stroke-width="1.5"/>
  <text class="kcap2" x="451" y="566" text-anchor="middle" fill="#8a6312">SILENCE</text></g>
 <g class="key"><rect id="key-onoff" data-control="hardkey" data-action="ONOFF" x="382" y="588" width="138" height="40" rx="7" fill="#eef1f3" stroke="#c2c8ce" stroke-width="1.5"/>
  <text class="kcap2" x="451" y="612" text-anchor="middle">ON / OFF</text></g>

 <!-- START / STOP -->
 <g class="key"><rect id="key-start" data-control="hardkey" data-action="START" x="160" y="644" width="200" height="56" rx="8" fill="#e7f4ec" stroke="#a9d4ba" stroke-width="1.8"/>
  <text class="kcap" x="260" y="678" text-anchor="middle" fill="#207a43" font-size="14">START</text></g>
 <g class="key"><rect id="key-stop" data-control="hardkey" data-action="STOP" x="382" y="644" width="138" height="56" rx="8" fill="#fdeceb" stroke="#e0a9a4" stroke-width="1.8"/>
  <text class="kcap" x="451" y="678" text-anchor="middle" fill="#a8322a" font-size="14">STOP</text></g>

 <!-- integrated barcode scanner -->
 <rect x="540" y="240" width="120" height="200" rx="14" fill="url(#scanGrad)" stroke="#1b1f23" stroke-width="2"/>
 <rect x="554" y="256" width="92" height="58" rx="6" fill="#0c1014" stroke="#3a4047" stroke-width="1.5"/>
 <!-- scanner emitter window with red beam -->
 <rect x="562" y="266" width="76" height="38" rx="3" fill="#1a0e0e"/>
 <line x1="566" y1="285" x2="634" y2="285" stroke="#D7382E" stroke-width="3"/>
 <text class="sub" x="600" y="334" text-anchor="middle" font-size="9" fill="#9aa2ab">BARCODE</text>
 <text class="sub" x="600" y="345" text-anchor="middle" font-size="9" fill="#9aa2ab">SCANNER</text>
 <!-- scanner trigger -->
 <g class="key"><rect id="key-scan" data-control="hardkey" data-action="SCAN" x="556" y="360" width="88" height="62" rx="8" fill="#41474e" stroke="#2a2f34" stroke-width="1.5"/>
  <text class="kcap2" x="600" y="389" text-anchor="middle" fill="#e9eef2">SCAN</text>
  <text x="600" y="404" font-size="8" fill="#aab2ba" text-anchor="middle">patient / drug / pump</text></g>

 <!-- linear peristaltic set-loading door -->
 <rect x="146" y="716" width="468" height="120" rx="10" fill="#dde0e3" stroke="#aeb4ba" stroke-width="2"/>
 <rect x="166" y="736" width="320" height="80" rx="6" fill="#c9cdd1" stroke="#aeb4ba" stroke-width="1.5"/>
 <!-- peristaltic fingers hint -->
 <line x1="186" y1="746" x2="186" y2="806" stroke="#a7adb3" stroke-width="3"/>
 <line x1="206" y1="746" x2="206" y2="806" stroke="#a7adb3" stroke-width="3"/>
 <line x1="226" y1="746" x2="226" y2="806" stroke="#a7adb3" stroke-width="3"/>
 <line x1="246" y1="746" x2="246" y2="806" stroke="#a7adb3" stroke-width="3"/>
 <text class="sub" x="326" y="780" text-anchor="middle">Administration-set door (linear peristaltic)</text>
 <rect x="520" y="746" width="74" height="58" rx="7" fill="#e7eaed" stroke="#aeb4ba" stroke-width="1.5"/>
 <line x1="557" y1="754" x2="557" y2="796" stroke="#7c8389" stroke-width="3.5"/>
 <text class="sub" x="557" y="820" text-anchor="middle" font-size="9">LATCH</text>
</g>

<g id="indicators">
 <!-- Line Check Notification: distinctive lit colour band that matches pump to medication -->
 <rect x="540" y="118" width="120" height="104" rx="10" fill="#0c2238" stroke="#11151a" stroke-width="2"/>
 <text x="600" y="138" font-size="9" font-weight="bold" fill="#9fb0bd" text-anchor="middle">LINE CHECK</text>
 <rect id="led-line-check" data-control="led" x="552" y="146" width="96" height="40" rx="6" fill="#E6A032" stroke="#b87f1f" stroke-width="1.5"/>
 <text x="600" y="171" font-size="11" font-weight="bold" fill="#3a2a08" text-anchor="middle">HEPARIN</text>
 <text x="600" y="206" font-size="8.5" fill="#7f93a4" text-anchor="middle">Matches pump</text>
 <text x="600" y="216" font-size="8.5" fill="#7f93a4" text-anchor="middle">to medication</text>

 <!-- run + alarm LEDs (right of the scanner block) -->
 <circle id="led-run" data-control="led" cx="556" cy="466" r="10" fill="#3DA35D" stroke="#2c7d46" stroke-width="1.4"/>
 <circle cx="553" cy="463" r="3.2" fill="#bfe8cc"/>
 <text class="sub" x="574" y="471" font-weight="bold">RUN</text>
 <circle id="led-alarm" data-control="led" cx="556" cy="500" r="10" fill="#5b6470" stroke="#444b54" stroke-width="1.4"/>
 <text class="sub" x="574" y="505" font-weight="bold">ALARM</text>

 <!-- battery icon on chassis -->
 <rect x="146" y="848" width="30" height="15" rx="2" fill="none" stroke="#5b6470" stroke-width="1.6"/>
 <rect x="176" y="852" width="4" height="7" fill="#5b6470"/>
 <rect x="148" y="850" width="22" height="11" fill="#3DA35D"/>
 <text id="led-ac" data-control="led" class="sub" x="188" y="861">AC power - battery charging</text>
</g>

<g id="labels">
 <text class="badge" x="390" y="938" text-anchor="middle" font-weight="bold">TRAINING SIMULATION - NOT A MEDICAL DEVICE</text>
 <text class="badge" x="390" y="958" text-anchor="middle">Simulated interface - Baxter Spectrum IQ Infusion System</text>
</g>
</svg>
