<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cyrus Care — MEDSIM V3</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef2f5; --panel:#ffffff; --ink:#0b3454; --ink-2:#37536b; --ink-3:#6c8497;
    --line:#cfdae3; --line-2:#e3eaef;
    --navy:#0e4c5e; --teal:#247aa5; --teal-tint:#e2eef5;
    --gold:#c48f1a; --gold-tint:#fbf0d6;
    --rose:#b13b3b; --rose-tint:#f7dfdf;
    --green:#2b7a2b; --green-tint:#e0f1e0;
    --shadow:0 1px 0 rgba(11,52,84,.06), 0 1px 2px rgba(11,52,84,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}
  ::selection{background:var(--teal-tint)}
  #app{min-height:100vh;display:flex;flex-direction:column}
  .v3-banner{position:fixed;top:0;left:0;right:0;background:#0e4c5e;color:#fff;font-size:11px;padding:4px 12px;text-align:center;z-index:200;font-family:'JetBrains Mono',monospace}
  .v3-banner.locked{background:#b13b3b}
  .v3-banner code{background:rgba(255,255,255,.18);padding:0 4px;border-radius:3px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="v3-banner-mount"></div>
<div id="app"></div>

<script>
  window.MEDSIM_V3 = {{ bootstrap_json | safe }};
  window.MEDSIM_V3.EHR_ID = "cyrus";
</script>
<script src="/static/medsim_v3_client.js"></script>
<script type="text/babel" src="/ehr-static/cyrus/data.jsx"></script>
<script type="text/babel" src="/ehr-static/cyrus/ui.jsx"></script>
<script type="text/babel" src="/ehr-static/cyrus/screens.jsx"></script>
<script type="text/babel" src="/ehr-static/cyrus/app.jsx"></script>
</body>
</html>
