<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ persona_name }} · Shared station · Training Bridge VRAI-MedSim</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font: 16px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #eef2f6; color: #14202b; display: flex; flex-direction: column; height: 100vh; }
    header { background: #14202b; color: #eef4f8; padding: 12px 16px; }
    header .name { font-size: 18px; font-weight: 700; }
    header .role { font-size: 13px; color: #9fb4c4; }
    header .covering { font-size: 12.5px; color: #bfe0ff; margin-top: 4px; }
    #log { flex: 1 1 auto; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 9px 13px; border-radius: 12px; white-space: pre-wrap; }
    .msg.you { align-self: flex-end; background: #2b6cb0; color: #fff; border-bottom-right-radius: 3px; }
    .msg.them { align-self: flex-start; background: #fff; border: 1px solid #d7dee5; border-bottom-left-radius: 3px; }
    .msg .who { display: block; font-size: 11px; font-weight: 600; opacity: 0.7; margin-bottom: 2px; }
    .err { align-self: center; color: #a32d2d; font-size: 13px; }
    form { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #d7dee5; }
    #message { flex: 1 1 auto; font: inherit; border: 1px solid #c4cfd9; border-radius: 8px; padding: 10px 12px; }
    button { font: inherit; font-weight: 600; background: #2b6cb0; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; cursor: pointer; }
    button:disabled { opacity: 0.6; }
  </style>
</head>
<body>
  <header>
    <div class="name">{{ persona_name }}</div>
    <div class="role">{{ persona_role }} · shared across the room</div>
    <div class="covering">Covering {{ room_label }}: {{ patients | join(' · ') }}</div>
  </header>
  <div id="log" aria-live="polite"></div>
  <form id="chat">
    <input id="message" name="message" type="text" autocomplete="off"
           placeholder="Speak to {{ persona_name }}…" aria-label="Message">
    <button type="button" id="talk" title="Hold to talk">🎤 Hold</button>
    <button type="submit" id="send">Send</button>
  </form>
  <script>
    var PERSONA = {{ persona_id | tojson }};
    var NAME = {{ persona_name | tojson }};
    var log = document.getElementById("log");
    var form = document.getElementById("chat");
    var input = document.getElementById("message");
    var send = document.getElementById("send");
    var talk = document.getElementById("talk");
    function bubble(cls, who, text) {
      var d = document.createElement("div"); d.className = "msg " + cls;
      if (who) { var w = document.createElement("span"); w.className = "who"; w.textContent = who; d.appendChild(w); }
      d.appendChild(document.createTextNode(text));
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    }
    function err(text) { var d = document.createElement("div"); d.className = "err"; d.textContent = text; log.appendChild(d); log.scrollTop = log.scrollHeight; }
    // Speak the reply in the character's assigned voice (ElevenLabs via /api/tts),
    // falling back to the browser voice when none is set.
    function speak(text, voiceId) {
      if (!text) return;
      if (voiceId) {
        fetch("/api/tts", { method: "POST", credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text, voice_id: voiceId }) })
          .then(function (r) { return r.ok ? r.blob() : null; })
          .then(function (b) { if (b) { var u = URL.createObjectURL(b); var a = new Audio(u);
            a.addEventListener("ended", function () { URL.revokeObjectURL(u); }); a.play(); } })
          .catch(function () {});
      } else if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
      }
    }
    function sendMessage(text) {
      text = (text || "").trim();
      if (!text) return;
      bubble("you", "You", text);
      input.value = ""; send.disabled = true;
      var body = new FormData(); body.append("message", text);
      fetch("/api/room/shared/" + encodeURIComponent(PERSONA) + "/turn",
            { method: "POST", credentials: "same-origin", body: body })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (data && data.ok) { bubble("them", data.character_name || NAME, data.reply);
                                 speak(data.reply, data.voice_id); }
          else err((data && data.error) || "Reply failed.");
        })
        .catch(function () { err("Network error."); })
        .then(function () { send.disabled = false; input.focus(); });
    }
    form.addEventListener("submit", function (e) { e.preventDefault(); sendMessage(input.value); });

    // Hold-to-talk (browser speech-to-text). Falls back to typing where unsupported.
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      var recog = null, listening = false, finalText = "";
      var startTalk = function () {
        if (listening) return;
        recog = new SR(); recog.lang = "en-US"; recog.interimResults = true; recog.continuous = true;
        finalText = "";
        recog.onresult = function (ev) {
          var intr = "";
          for (var i = ev.resultIndex; i < ev.results.length; i++) {
            var t = ev.results[i][0].transcript;
            if (ev.results[i].isFinal) finalText += t; else intr += t;
          }
          input.value = (finalText + intr).trim();
        };
        recog.onerror = function () { stopTalk(true); };
        try { recog.start(); listening = true; talk.textContent = "● Listening";
              talk.style.background = "#cc2f2f"; } catch (e) {}
      };
      var stopTalk = function (abort) {
        if (!listening) return;
        listening = false; talk.textContent = "🎤 Hold"; talk.style.background = "";
        try { recog && recog.stop(); } catch (e) {}
        var said = (finalText || input.value || "").trim();
        if (!abort && said) sendMessage(said);
      };
      talk.addEventListener("mousedown", startTalk);
      talk.addEventListener("touchstart", function (e) { e.preventDefault(); startTalk(); }, { passive: false });
      talk.addEventListener("mouseup", function () { stopTalk(false); });
      talk.addEventListener("mouseleave", function () { if (listening) stopTalk(false); });
      talk.addEventListener("touchend", function (e) { e.preventDefault(); stopTalk(false); });
    } else {
      talk.disabled = true; talk.title = "Voice needs Chrome/Edge — type instead";
    }
    input.focus();
  </script>
</body>
</html>
